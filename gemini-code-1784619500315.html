<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ Request Hub</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: #030712; 
      color: #f3f4f6; 
      margin: 0;
      padding: 0;
    }
    .glass-panel { 
      background: rgba(17, 24, 39, 0.85); 
      backdrop-filter: blur(16px); 
      border: 1px solid rgba(255, 255, 255, 0.08); 
    }
    .glow-cyan { box-shadow: 0 0 30px -5px rgba(6, 182, 212, 0.25); }
    .glow-purple { box-shadow: 0 0 30px -5px rgba(168, 85, 247, 0.25); }
    .vinyl-spin { animation: spin 2s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen p-3 md:p-6 relative selection:bg-cyan-500 selection:text-black">

  <div class="max-w-5xl mx-auto space-y-6 relative z-10">
    
    <header class="glass-panel rounded-2xl p-4 flex justify-between items-center glow-purple">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 rounded-xl bg-gradient-to-tr from-cyan-500 via-indigo-500 to-purple-500 flex items-center justify-center text-xl font-black shadow-lg">
          🎛️
        </div>
        <div>
          <h1 class="text-lg md:text-xl font-extrabold bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent uppercase tracking-wider">
            DJ Request Hub
          </h1>
          <div class="flex items-center gap-2 text-xs text-gray-400">
            <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
            <span id="partyNameDisplay" class="font-semibold text-gray-200">Main Stage</span>
          </div>
        </div>
      </div>

      <button onclick="toggleAdminMode()" id="adminToggleBtn" class="bg-gray-800/80 hover:bg-gray-700 text-xs font-bold px-4 py-2.5 rounded-xl border border-gray-700 transition flex items-center gap-2">
        <span>🔐</span> <span id="adminBtnText">DJ Access</span>
      </button>
    </header>

    <main id="guestView" class="space-y-6">
      
      <div class="glass-panel rounded-3xl p-6 md:p-8 glow-cyan relative">
        <div class="flex justify-between items-start mb-6">
          <div>
            <span class="px-3 py-1 bg-cyan-950/80 text-cyan-400 border border-cyan-800/60 text-[10px] font-extrabold tracking-widest uppercase rounded-full">Live Booth</span>
            <h2 class="text-2xl font-black text-white mt-2">Request a Track</h2>
          </div>
          <div class="text-right">
            <span class="text-[10px] text-gray-400 uppercase font-bold tracking-wider block">Est. Wait</span>
            <span id="estimatedWaitDisplay" class="text-sm font-black text-cyan-400">0 mins</span>
          </div>
        </div>

        <form id="requestForm" onsubmit="submitRequest(event)" class="space-y-4">
          
          <div class="relative">
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">🔍 Search Apple Music Catalog</label>
            <input type="text" id="songTitle" required oninput="handleSongSearch()" autocomplete="off" class="w-full px-4 py-3 rounded-xl bg-gray-900/90 border border-gray-800 text-sm focus:outline-none focus:border-cyan-400 text-white placeholder-gray-600 transition" placeholder="Type song or artist name (e.g. Drake, Taylor Swift)...">
            
            <div id="searchResults" class="hidden absolute left-0 right-0 top-full mt-2 bg-gray-900/95 backdrop-blur-xl border border-cyan-500/30 rounded-2xl shadow-2xl z-50 max-h-60 overflow-y-auto divide-y divide-gray-800/60">
            </div>
          </div>

          <div class="grid md:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Artist Name</label>
              <input type="text" id="artist" required class="w-full px-4 py-3 rounded-xl bg-gray-900/90 border border-gray-800 text-sm focus:outline-none focus:border-cyan-400 text-white placeholder-gray-600 transition" placeholder="Autofilled from search">
            </div>
            <div>
              <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Your Name (Optional)</label>
              <input type="text" id="guestName" class="w-full px-4 py-3 rounded-xl bg-gray-900/90 border border-gray-800 text-sm focus:outline-none focus:border-cyan-400 text-white placeholder-gray-600 transition" placeholder="e.g. Alex">
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Shoutout / Dedication</label>
            <input type="text" id="dedication" class="w-full px-4 py-3 rounded-xl bg-gray-900/90 border border-gray-800 text-sm focus:outline-none focus:border-cyan-400 text-white placeholder-gray-600 transition" placeholder="e.g. Dedicated to Sarah!">
          </div>

          <input type="hidden" id="albumArtUrl" value="">

          <button type="submit" id="submitBtn" class="w-full py-4 rounded-xl bg-gradient-to-r from-cyan-500 via-blue-600 to-purple-600 hover:opacity-95 font-black text-sm tracking-wide text-white transition shadow-lg shadow-cyan-950/50 flex items-center justify-center gap-2">
            <span>Send Request</span> 🚀
          </button>
        </form>

        <div id="deckModal" class="hidden absolute inset-0 bg-gray-950/95 backdrop-blur-md flex flex-col items-center justify-center z-30 p-6 text-center rounded-3xl">
          <div class="w-24 h-24 rounded-2xl bg-gray-900 border-2 border-cyan-400 flex items-center justify-center shadow-2xl glow-cyan mb-3 relative">
            <div class="w-16 h-16 rounded-full bg-gray-950 border-4 border-gray-800 vinyl-spin flex items-center justify-center">
              <div class="w-6 h-6 rounded-full bg-gradient-to-tr from-cyan-400 to-purple-500"></div>
            </div>
          </div>
          <h3 class="text-base font-extrabold text-white animate-bounce">Broadcasting Track...</h3>
        </div>
      </div>

      <div class="glass-panel rounded-3xl p-6">
        <div class="flex justify-between items-center mb-4 pb-3 border-b border-gray-800">
          <h3 class="text-base font-extrabold text-cyan-400 flex items-center gap-2">
            🎵 Live Setlist Queue
          </h3>
          <span class="text-xs text-gray-500 font-semibold">Vote tracks up!</span>
        </div>

        <div id="publicQueueList" class="space-y-3"></div>
      </div>
    </main>

    <section id="adminView" class="hidden space-y-6">
      <div class="glass-panel p-4 rounded-2xl flex flex-wrap justify-between items-center gap-4">
        <div class="flex items-center gap-3">
          <label class="text-xs font-bold uppercase text-gray-400">Party Title:</label>
          <input type="text" id="partyTitleInput" value="Main Stage" class="bg-gray-900 border border-gray-700 px-3 py-1.5 rounded-xl text-xs text-white focus:outline-none focus:border-cyan-400">
          <button onclick="updatePartyTitle()" class="bg-purple-600 hover:bg-purple-500 text-xs px-3 py-1.5 rounded-xl font-bold transition">Save</button>
        </div>

        <button onclick="clearSetlist()" class="bg-red-950/80 hover:bg-red-900 text-red-300 border border-red-800 text-xs px-4 py-2 rounded-xl font-bold transition">
          🗑️ Clear All
        </button>
      </div>

      <div class="grid lg:grid-cols-3 gap-6">
        <div class="glass-panel p-6 rounded-2xl flex flex-col items-center justify-center text-center">
          <span class="px-3 py-1 bg-purple-950 text-purple-300 text-[10px] font-bold uppercase rounded-full mb-3">Booth Display</span>
          <h3 class="text-sm font-extrabold mb-3">Scan for Request Form</h3>
          <div id="qrcode" class="p-3 bg-white rounded-2xl min-h-[140px] flex items-center justify-center"></div>
          <p class="text-[10px] text-gray-500 mt-3 break-all max-w-[200px]" id="qrUrlDisplay"></p>
        </div>

        <div class="glass-panel p-6 rounded-2xl">
          <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-800">
            <h3 class="text-sm font-extrabold text-yellow-400">📥 Incoming Requests</h3>
            <span id="pendingBadge" class="bg-yellow-950 text-yellow-400 text-xs font-bold px-2 py-0.5 rounded-full border border-yellow-800">0</span>
          </div>
          <div id="adminPendingList" class="space-y-3"></div>
        </div>

        <div class="glass-panel p-6 rounded-2xl">
          <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-800">
            <h3 class="text-sm font-extrabold text-cyan-400">🎧 Approved Queue</h3>
            <span id="queuedBadge" class="bg-cyan-950 text-cyan-400 text-xs font-bold px-2 py-0.5 rounded-full border border-cyan-800">0</span>
          </div>
          <div id="adminApprovedList" class="space-y-3"></div>
        </div>
      </div>
    </section>

  </div>

  <script>
    // --- FIREBASE SETUP ---
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
      projectId: "YOUR_PROJECT",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "123456789",
      appId: "YOUR_APP_ID"
    };

    let db = null;
    let isAdmin = false;
    let requests = [];
    let searchDebounceTimer = null;

    try {
      if (typeof firebase !== 'undefined' && firebaseConfig.apiKey && !firebaseConfig.apiKey.includes("YOUR_API_KEY")) {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        
        db.ref('requests').on('value', (snapshot) => {
          const data = snapshot.val();
          requests = data ? Object.keys(data).map(k => ({ id: k, ...data[k] })) : [];
          render();
        });

        db.ref('partyTitle').on('value', (s) => {
          if (s.val()) document.getElementById('partyNameDisplay').innerText = s.val();
        });
      }
    } catch(err) {
      console.log("Offline mode.");
    }

    // --- LIVE MUSIC SEARCH API (APPLE MUSIC/ITUNES) ---
    function handleSongSearch() {
      const query = document.getElementById("songTitle").value.trim();
      const resultsContainer = document.getElementById("searchResults");

      clearTimeout(searchDebounceTimer);

      if (query.length < 2) {
        resultsContainer.classList.add("hidden");
        return;
      }

      // Debounce network requests by 300ms
      searchDebounceTimer = setTimeout(() => {
        fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=6`)
          .then(res => res.json())
          .then(data => {
            if (data.results && data.results.length > 0) {
              resultsContainer.innerHTML = "";
              data.results.forEach(song => {
                const coverArt = song.artworkUrl60 || 'https://via.placeholder.com/60';
                resultsContainer.innerHTML += `
                  <div onclick="selectSong('${song.trackName.replace(/'/g, "\\'")}', '${song.artistName.replace(/'/g, "\\'")}', '${coverArt}')" class="p-2.5 flex items-center gap-3 hover:bg-cyan-950/60 cursor-pointer transition">
                    <img src="${coverArt}" class="w-10 h-10 rounded-lg object-cover shadow" />
                    <div>
                      <p class="text-xs font-bold text-white">${song.trackName}</p>
                      <p class="text-[11px] text-gray-400">${song.artistName}</p>
                    </div>
                  </div>
                `;
              });
              resultsContainer.classList.remove("hidden");
            } else {
              resultsContainer.classList.add("hidden");
            }
          })
          .catch(() => resultsContainer.classList.add("hidden"));
      }, 300);
    }

    function selectSong(title, artist, cover) {
      document.getElementById("songTitle").value = title;
      document.getElementById("artist").value = artist;
      document.getElementById("albumArtUrl").value = cover;
      document.getElementById("searchResults").classList.add("hidden");
    }

    // Close dropdown on click outside
    document.addEventListener("click", (e) => {
      if (!e.target.closest("#searchResults") && e.target.id !== "songTitle") {
        document.getElementById("searchResults").classList.add("hidden");
      }
    });

    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(587.33, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
      } catch(e) {}
    }

    function submitRequest(e) {
      e.preventDefault();
      const title = document.getElementById("songTitle").value;
      const artist = document.getElementById("artist").value;
      const guestName = document.getElementById("guestName").value || "Anonymous";
      const dedication = document.getElementById("dedication").value || "";
      const art = document.getElementById("albumArtUrl").value || "";

      document.getElementById("deckModal").classList.remove("hidden");
      playBeep();

      if (typeof confetti !== 'undefined') {
        confetti({ particleCount: 70, spread: 60, origin: { y: 0.7 } });
      }

      setTimeout(() => {
        const item = {
          title, artist, guestName, dedication, art,
          status: "pending", votes: 1, timestamp: Date.now()
        };

        if (db) {
          db.ref('requests').push(item);
        } else {
          requests.push({ id: Date.now().toString(), ...item });
          render();
        }

        document.getElementById("requestForm").reset();
        document.getElementById("albumArtUrl").value = "";
        document.getElementById("deckModal").classList.add("hidden");
      }, 1200);
    }

    function vote(id, delta) {
      const target = requests.find(r => r.id === id);
      if (!target) return;
      const newVotes = Math.max(0, (target.votes || 0) + delta);
      if (db) {
        db.ref(`requests/${id}`).update({ votes: newVotes });
      } else {
        target.votes = newVotes;
        render();
      }
    }

    function updateStatus(id, newStatus) {
      if (db) {
        db.ref(`requests/${id}`).update({ status: newStatus });
      } else {
        const target = requests.find(r => r.id === id);
        if (target) { target.status = newStatus; render(); }
      }
    }

    function clearSetlist() {
      if (confirm("Clear all requests?")) {
        if (db) db.ref('requests').remove();
        else { requests = []; render(); }
      }
    }

    function updatePartyTitle() {
      const val = document.getElementById('partyTitleInput').value.trim();
      if (val) {
        if (db) db.ref('partyTitle').set(val);
        document.getElementById('partyNameDisplay').innerText = val;
      }
    }

    function toggleAdminMode() {
      if (!isAdmin) {
        const pass = prompt("Enter DJ Admin Password:", "1234");
        if (pass === "1234") {
          isAdmin = true;
          document.getElementById("guestView").classList.add("hidden");
          document.getElementById("adminView").classList.remove("hidden");
          document.getElementById("adminBtnText").innerText = "Exit Mode";
          setTimeout(renderQRCode, 50);
          render();
        } else if (pass !== null) {
          alert("Access Denied");
        }
      } else {
        isAdmin = false;
        document.getElementById("guestView").classList.remove("hidden");
        document.getElementById("adminView").classList.add("hidden");
        document.getElementById("adminBtnText").innerText = "DJ Access";
        render();
      }
    }

    function renderQRCode() {
      const el = document.getElementById("qrcode");
      if (!el) return;
      el.innerHTML = "";
      const url = window.location.href;
      document.getElementById("qrUrlDisplay").innerText = url;
      if (typeof QRCode !== 'undefined') {
        new QRCode(el, { text: url, width: 130, height: 130, colorDark: "#000000", colorLight: "#ffffff" });
      }
    }

    function render() {
      const publicQueueList = document.getElementById('publicQueueList');
      const adminPendingList = document.getElementById('adminPendingList');
      const adminApprovedList = document.getElementById('adminApprovedList');

      if (!publicQueueList || !adminPendingList || !adminApprovedList) return;

      publicQueueList.innerHTML = '';
      adminPendingList.innerHTML = '';
      adminApprovedList.innerHTML = '';

      const sorted = [...requests].sort((a,b) => (b.votes || 0) - (a.votes || 0));
      const pending = sorted.filter(r => r.status === 'pending');
      const queued = sorted.filter(r => r.status === 'queued');

      document.getElementById('estimatedWaitDisplay').innerText = `${queued.length * 3.5} mins`;
      document.getElementById('pendingBadge').innerText = pending.length;
      document.getElementById('queuedBadge').innerText = queued.length;

      // Render Public Setlist
      if (sorted.length === 0) {
        publicQueueList.innerHTML = `<p class="text-xs text-gray-500 italic py-4 text-center">No track requests yet. Type a song above!</p>`;
      } else {
        sorted.forEach(req => {
          let badge = `<span class="text-[10px] text-yellow-400 font-extrabold uppercase bg-yellow-950 px-2 py-0.5 rounded border border-yellow-800">Pending</span>`;
          if (req.status === 'queued') badge = `<span class="text-[10px] text-cyan-400 font-extrabold uppercase bg-cyan-950 px-2 py-0.5 rounded border border-cyan-800">Up Next</span>`;
          if (req.status === 'played') badge = `<span class="text-[10px] text-gray-400 font-extrabold uppercase bg-gray-800 px-2 py-0.5 rounded">Played</span>`;
          if (req.status === 'denied') badge = `<span class="text-[10px] text-red-400 font-extrabold uppercase bg-red-950 px-2 py-0.5 rounded border border-red-800">Denied</span>`;

          const artImage = req.art ? `<img src="${req.art}" class="w-10 h-10 rounded-lg object-cover" />` : `<div class="w-10 h-10 rounded-lg bg-gray-800 flex items-center justify-center text-xs">🎵</div>`;

          publicQueueList.innerHTML += `
            <div class="bg-gray-900/80 p-3 rounded-xl border border-gray-800 flex items-center justify-between gap-3">
              <div class="flex items-center gap-3">
                ${artImage}
                <div class="space-y-0.5">
                  <div class="flex items-center gap-2">
                    <p class="font-bold text-sm text-white ${req.status === 'played' || req.status === 'denied' ? 'line-through text-gray-500' : ''}">${req.title}</p>
                    ${badge}
                  </div>
                  <p class="text-xs text-gray-400">${req.artist} ${req.guestName ? `• <span class="text-cyan-400">Req by ${req.guestName}</span>` : ''}</p>
                  ${req.dedication ? `<p class="text-[11px] text-purple-300 italic">"${req.dedication}"</p>` : ''}
                </div>
              </div>
              <div class="flex items-center gap-2 bg-gray-950 px-2.5 py-1 rounded-lg border border-gray-800">
                <button onclick="vote('${req.id}', 1)" class="text-xs text-cyan-400 font-bold hover:scale-110 transition">▲</button>
                <span class="text-xs font-black text-white">${req.votes || 0}</span>
                <button onclick="vote('${req.id}', -1)" class="text-xs text-gray-500 font-bold hover:scale-110 transition">▼</button>
              </div>
            </div>
          `;
        });
      }

      // Render Admin Pending
      if (pending.length === 0) {
        adminPendingList.innerHTML = `<p class="text-xs text-gray-500 italic py-2 text-center">No pending requests</p>`;
      } else {
        pending.forEach(req => {
          adminPendingList.innerHTML += `
            <div class="bg-gray-900 p-3 rounded-xl border-l-4 border-yellow-400 border-t border-r border-b border-gray-800 space-y-2">
              <div>
                <p class="font-bold text-xs text-white">${req.title}</p>
                <p class="text-[11px] text-gray-400">${req.artist}</p>
              </div>
              <div class="flex gap-1.5">
                <button onclick="updateStatus('${req.id}', 'queued')" class="bg-cyan-600 hover:bg-cyan-500 text-[10px] px-2.5 py-1 rounded font-bold text-white transition">Approve</button>
                <button onclick="updateStatus('${req.id}', 'denied')" class="bg-red-950 hover:bg-red-900 text-red-300 border border-red-800 text-[10px] px-2.5 py-1 rounded font-bold transition">Deny</button>
              </div>
            </div>
          `;
        });
      }

      // Render Admin Approved
      if (queued.length === 0) {
        adminApprovedList.innerHTML = `<p class="text-xs text-gray-500 italic py-2 text-center">No approved tracks in queue</p>`;
      } else {
        queued.forEach(req => {
          adminApprovedList.innerHTML += `
            <div class="bg-gray-900 p-3 rounded-xl border-l-4 border-cyan-400 border-t border-r border-b border-gray-800 flex justify-between items-center">
              <div>
                <p class="font-bold text-xs text-white">${req.title}</p>
                <p class="text-[11px] text-gray-400">${req.artist}</p>
              </div>
              <button onclick="updateStatus('${req.id}', 'played')" class="bg-emerald-600 hover:bg-emerald-500 text-[10px] px-2.5 py-1 rounded font-bold text-white transition">Mark Played</button>
            </div>
          `;
        });
      }
    }

    window.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
