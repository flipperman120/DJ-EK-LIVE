<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request a Song</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">
  <div class="max-w-md w-full bg-gray-800 p-6 rounded-2xl shadow-xl">
    <h1 class="text-2xl font-bold mb-4 text-center text-purple-400">🎶 DJ Booth Requests</h1>
    
    <form id="requestForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">Song Title</label>
        <input type="text" id="songTitle" required class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:outline-none focus:border-purple-500" placeholder="e.g., Starlight">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Artist</label>
        <input type="text" id="artist" required class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:outline-none focus:border-purple-500" placeholder="e.g., Muse">
      </div>
      <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 font-bold py-3 rounded-lg transition duration-200">
        Send Request
      </button>
    </form>
    
    <div id="statusMessage" class="mt-4 text-center text-sm text-green-400 hidden">
      Request sent to the DJ! 🎉
    </div>
  </div>
</body>
</html>
