<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ Booth Dashboard & QR Stand</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen p-6">
  <div class="max-w-6xl mx-auto">
    <header class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
      <h1 class="text-3xl font-extrabold text-purple-400">🎛️ Live Request Board</h1>
      <span class="bg-green-500/10 text-green-400 px-3 py-1 rounded-full text-sm font-semibold animate-pulse">● Live Stream Active</span>
    </header>

    <div class="grid md:grid-cols-3 gap-6">
      
      <div class="bg-gray-900 p-5 rounded-xl border border-gray-800 flex flex-col items-center justify-center text-center">
        <h2 class="text-lg font-bold text-purple-300 mb-2">📲 Scan to Request a Song</h2>
        <p class="text-xs text-gray-400 mb-4">Point phone camera at code</p>
        
        <div id="qrcode" class="p-3 bg-white rounded-lg shadow-lg"></div>
        
        <p class="text-xs text-gray-500 mt-4 break-all" id="currentUrlDisplay"></p>
      </div>

      <div class="bg-gray-900 p-5 rounded-xl border border-gray-800">
        <h2 class="text-xl font-bold mb-4 text-yellow-400 flex items-center gap-2">
          📥 Incoming Requests
        </h2>
        <div id="incomingList" class="space-y-3">
          </div>
      </div>

      <div class="bg-gray-900 p-5 rounded-xl border border-gray-800">
        <h2 class="text-xl font-bold mb-4 text-green-400 flex items-center gap-2">
          🎧 Queue & History
        </h2>
        <div id="queueList" class="space-y-3">
          </div>
      </div>

    </div>
  </div>

  <script>
    // 1. SET YOUR REQUEST FORM URL HERE
    // Change this to the URL where your request page is hosted
    const requestPageUrl = "https://your-app-domain.com/request.html"; 

    // Generate QR Code dynamically
    new QRCode(document.getElementById("qrcode"), {
      text: requestPageUrl,
      width: 160,
      height: 160,
      colorDark : "#000000",
      colorLight : "#ffffff",
      correctLevel : QRCode.CorrectLevel.H
    });

    document.getElementById("currentUrlDisplay").innerText = requestPageUrl;

    // 2. Demo State & Logic
    let requests = [
      { id: 1, title: "Levitating", artist: "Dua Lipa", status: "pending" },
      { id: 2, title: "Blinding Lights", artist: "The Weeknd", status: "queued" }
    ];

    function render() {
      const incomingList = document.getElementById('incomingList');
      const queueList = document.getElementById('queueList');

      incomingList.innerHTML = '';
      queueList.innerHTML = '';

      requests.forEach(req => {
        if (req.status === 'pending') {
          incomingList.innerHTML += `
            <div class="bg-gray-800 p-3 rounded-lg flex justify-between items-center border-l-4 border-yellow-400">
              <div>
                <p class="font-semibold text-white text-sm">${req.title}</p>
                <p class="text-xs text-gray-400">${req.artist}</p>
              </div>
              <div class="flex gap-1">
                <button onclick="updateStatus(${req.id}, 'queued')" class="bg-blue-600 hover:bg-blue-500 text-xs px-2 py-1 rounded font-bold">Queue</button>
                <button onclick="updateStatus(${req.id}, 'played')" class="bg-green-600 hover:bg-green-500 text-xs px-2 py-1 rounded font-bold">Played</button>
              </div>
            </div>
          `;
        } else if (req.status === 'queued' || req.status === 'played') {
          const isPlayed = req.status === 'played';
          queueList.innerHTML += `
            <div class="bg-gray-800 p-3 rounded-lg flex justify-between items-center border-l-4 ${isPlayed ? 'border-gray-600 opacity-60' : 'border-green-400'}">
              <div>
                <p class="font-semibold text-white text-sm ${isPlayed ? 'line-through text-gray-400' : ''}">${req.title}</p>
                <p class="text-xs text-gray-400">${req.artist}</p>
              </div>
              <div>
                ${!isPlayed ? `<button onclick="updateStatus(${req.id}, 'played')" class="bg-green-600 hover:bg-green-500 text-xs px-2 py-1 rounded font-bold">Mark Played</button>` : `<span class="text-xs text-gray-500 font-bold">PLAYED</span>`}
              </div>
            </div>
          `;
        }
      });
    }

    function updateStatus(id, newStatus) {
      const target = requests.find(r => r.id === id);
      if (target) {
        target.status = newStatus;
        render();
      }
    }

    render();
  </script>
</body>
</html>
